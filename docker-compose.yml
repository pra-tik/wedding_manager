version: '3.9'
services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: wedding_planner
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data

  app:
    build: .
    environment:
      PORT: 4000
      DATABASE_URL: postgresql://postgres:postgres@db:5432/wedding_planner
      NODE_ENV: production
    ports:
      - '4000:4000'
    depends_on:
      - db

volumes:
  pgdata:
